# Deploy Montia to Production - v1.0.1
name: Deploy Montia to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add to known hosts
        run: ssh-keyscan -H 5.161.217.88 >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            -i ~/.ssh/id_rsa alejandro@5.161.217.88 "echo Conectado a Montia Server"

      - name: Deploy via rsync
        run: |
          rsync -avz --checksum --no-perms --no-owner --no-group \
            -e "ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='logs/' \
            --exclude='cache/' \
            --exclude='brain/' \
            --exclude='scratch/' \
            --exclude='test_*.php' \
            --exclude='debug_*.php' \
            --exclude='check_*.php' \
            --exclude='*.log' \
            ./ \
            alejandro@5.161.217.88:/home/forjiato/web/montia.mx/public_html/

      - name: Fix permissions on server
        run: |
          ssh -i ~/.ssh/id_rsa alejandro@5.161.217.88 << 'EOF'
            cd /home/forjiato/web/montia.mx/public_html
            # Asegurar permisos básicos
            sudo chown -R forjiato:forjiato .
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            # Blindaje .env
            sudo chown forjiato:forjiato .env 2>/dev/null || true
            sudo chmod 660 .env 2>/dev/null || true
            echo "Despliegue de Montia completado con éxito"
          EOF
